<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>AidFunds - Secure & Smart Investment Platform</title>
    <meta name="description" content="AidFunds provides secure, smart, and accessible investment solutions. Grow your wealth with expert financial advice." />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary-red': '#D61F26',
              'primary-dark': '#0A0A0A',
              'primary-gray': '#1A1A1A',
              'light-bg': '#FFFFFF',
              'light-bg-secondary': '#F9FAFB',
              'light-text': '#111827',
              'light-text-secondary': '#4B5563',
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .dashboard-card {
        background: #1A1A1A;
        border: 1px solid #333;
        transition: all 0.2s ease-in-out;
      }
      .dashboard-card:hover {
        border-color: #D61F26;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0A0A0A;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #D61F26;
      }
    </style>
